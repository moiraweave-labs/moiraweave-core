# ---------------------------------------------------------------------------
# SecretStore — GCP Secret Manager
#
# Apply this manifest once per cluster/namespace to allow ExternalSecrets
# Operator to pull secrets from GCP Secret Manager.
#
# Requirements:
#   - External Secrets Operator installed (https://external-secrets.io)
#   - A GCP Service Account with roles/secretmanager.secretAccessor
#     on the target secrets.
#
# Workload Identity (recommended for GKE):
#   1. Create a GCP Service Account:
#        gcloud iam service-accounts create moiraweave-eso \
#          --project=MY_PROJECT
#   2. Bind the GCP SA to the K8s SA via Workload Identity:
#        gcloud iam service-accounts add-iam-policy-binding \
#          moiraweave-eso@MY_PROJECT.iam.gserviceaccount.com \
#          --role roles/iam.workloadIdentityUser \
#          --member \
#          "serviceAccount:MY_PROJECT.svc.id.goog[moiraweave/moiraweave]"
#   3. Annotate the K8s ServiceAccount:
#        kubectl annotate sa moiraweave \
#          iam.gke.io/gcp-service-account=\
#          moiraweave-eso@MY_PROJECT.iam.gserviceaccount.com \
#          -n moiraweave
#   4. Use auth.workloadIdentity below (Option B).
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: moiraweave          # change to your namespace
spec:
  provider:
    gcpsm:
      projectID: MY_PROJECT      # change to your GCP project ID
      # --- Option A: Service Account JSON key (stored in a K8s secret) ---
      # Create the secret first:
      #   kubectl create secret generic gcp-credentials \
      #     --from-file=serviceAccountKey=./sa-key.json \
      #     -n moiraweave
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: gcp-credentials
            key: serviceAccountKey
      # --- Option B: Workload Identity (recommended for GKE) ---
      # auth:
      #   workloadIdentity:
      #     clusterLocation: europe-west1     # change to your region
      #     clusterName: my-gke-cluster       # change to your cluster name
      #     clusterProjectID: MY_PROJECT      # change to your GCP project ID
      #     serviceAccountRef:
      #       # K8s SA annotated with Workload Identity.
      #       name: moiraweave
