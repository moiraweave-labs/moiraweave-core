# ---------------------------------------------------------------------------
# SecretStore — AWS Secrets Manager
#
# Apply this manifest once per cluster/namespace to allow ExternalSecrets
# Operator to pull secrets from AWS Secrets Manager.
#
# Requirements:
#   - External Secrets Operator installed (https://external-secrets.io)
#   - IAM Role with secretsmanager:GetSecretValue permission on the target
#     secrets, bound to the moiraweave ServiceAccount via IRSA or IAM user
#     credentials stored in the `aws-credentials` secret below.
#
# IRSA (recommended):
#   - Annotate the ServiceAccount with the IAM role ARN:
#       kubectl annotate sa moiraweave \
#         eks.amazonaws.com/role-arn=arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME \
#         -n moiraweave
#   - Set auth.jwt.serviceAccountRef instead of auth.secretRef (see below).
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: moiraweave          # change to your namespace
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1          # change to your AWS region
      # --- Option A: IAM user credentials (stored in a K8s secret) ---
      # Create the secret first:
      #   kubectl create secret generic aws-credentials \
      #     --from-literal=access-key-id=AKIA... \
      #     --from-literal=secret-access-key=... \
      #     -n moiraweave
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
      # --- Option B: IRSA for EKS.
      # Comment out Option A above when using this.
      # auth:
      #   jwt:
      #     serviceAccountRef:
      #       name: moiraweave    # ServiceAccount annotated with IAM role ARN
