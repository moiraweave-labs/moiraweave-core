apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: moiraweave
  namespace: argocd
  finalizers:
    # Prevent deletion while Applications exist.
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "MoiraWeave workloads - dev / staging / prod"

  # Allowed source repos.
  sourceRepos:
    - https://github.com/moiraweave-labs/moiraweave.git

  # Allowed destination clusters and namespaces.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: moiraweave-dev
    - server: https://kubernetes.default.svc
      namespace: moiraweave-staging
    - server: https://kubernetes.default.svc
      namespace: moiraweave-prod

  # Allowed cluster-scoped resource kinds.
  # None needed beyond namespaced resources.
  clusterResourceWhitelist: []

  # All namespaced resources are allowed.
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Orphaned resources warning (helps detect manually applied resources).
  orphanedResources:
    warn: true
