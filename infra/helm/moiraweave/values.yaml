# ---------------------------------------------------------------------------
# MoiraWeave Helm chart — base values
# Override with values-dev.yaml or values-prod.yaml
# ---------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""
# ---------------------------------------------------------------------------
# Image pull secrets for workload images stored in private registries.
# Create a secret once with:
#   kubectl create secret docker-registry moiraweave-workload-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<user> \
#     --docker-password=<token> \
#     --namespace=<your-ns>
# Then reference it here.
# ---------------------------------------------------------------------------
imagePullSecrets: []
# - name: moiraweave-workload-pull-secret
# ---------------------------------------------------------------------------
# Image registry used by CI/CD (F3-3 pushes here)
# ---------------------------------------------------------------------------
imageRegistry: ghcr.io/moiraweave-labs
# ---------------------------------------------------------------------------
# api-gateway
# ---------------------------------------------------------------------------
apiGateway:
  image:
    repository: ghcr.io/moiraweave-labs/moiraweave/api-gateway
    tag: sha-9853bd2
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Horizontal Pod Autoscaler (requires metrics-server; see hpa.yaml)
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # List (not map) to guarantee stable env-var order across renders → avoids
  # unnecessary pod restarts caused by non-deterministic Go map iteration.
  env:
    - name: JWT_ALGORITHM
      value: HS256
    - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
      value: "30"
    - name: RATE_LIMIT_DEFAULT
      value: 100/minute
    - name: RATE_LIMIT_AUTH
      value: 10/minute
    - name: EMBEDDING_MODEL
      value: BAAI/bge-small-en-v1.5
    - name: WORKLOADS_DIR
      value: /workspace/workloads
    - name: ARTIFACTS_DIR
      value: /workspace/artifacts
    - name: OTEL_ENABLED
      value: "false"
    - name: OTEL_OTLP_ENDPOINT
      value: http://jaeger-collector:4318
  # Reference to a pre-existing K8s Secret that contains JWT_SECRET_KEY.
  # Create it once with:
  #   kubectl create secret generic moiraweave-secrets \
  #     --from-literal=JWT_SECRET_KEY=<your-32-char-secret>
  existingSecret: moiraweave-secrets
  secretKey: JWT_SECRET_KEY
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  # PodDisruptionBudget: keep at least 1 pod available during voluntary disruptions.
  pdb:
    enabled: true
    minAvailable: 1
  # Ingress (requires ingress-nginx + cert-manager, F2-8)
  ingress:
    enabled: false
    host: moiraweave.local
    tls: false
    clusterIssuer: moiraweave-ca-issuer
    annotations: {}
# ---------------------------------------------------------------------------
# worker
# ---------------------------------------------------------------------------
worker:
  image:
    repository: ghcr.io/moiraweave-labs/moiraweave/worker
    tag: sha-9853bd2
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: LOG_LEVEL
      value: INFO
    - name: WORKLOADS_DIR
      value: /workspace/workloads
    - name: ARTIFACTS_DIR
      value: /workspace/artifacts
  livenessProbe:
    exec:
      command:
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1',9090),1); s.close()"
    initialDelaySeconds: 15
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1',9090),1); s.close()"
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  # HPA — standard Kubernetes HPA for the worker.
  # Set hpa.type: "keda" to use KEDA ScaledObject (Redis Streams trigger) instead.
  hpa:
    enabled: false
    # "hpa" uses standard kubernetes HPA; "keda" uses KEDA ScaledObject.
    type: "hpa"
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    # KEDA-specific settings (only used when type = "keda").
    # Requires KEDA operator installed in the cluster.
    keda:
      redisStreamKey: "moiraweave:runs"
      consumerGroup: moiraweave-runs
      pendingEntriesCount: "5" # scale-up threshold per replica
      # Address of the Redis instance (overrides moiraweave.redisUrl if set).
      # Defaults to the in-cluster Redis service derived from moiraweave.redisUrl.
      address: ""
  # PodDisruptionBudget for worker.
  pdb:
    enabled: true
    minAvailable: 1
# ---------------------------------------------------------------------------
# Redis (Bitnami subchart)
# https://github.com/bitnami/charts/tree/main/bitnami/redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    # Enable Redis password authentication.
    # Set auth.existingSecret + auth.existingSecretPasswordKey or auth.password.
    # Override with: --set redis.auth.password=<your-password>
    enabled: true
    existingSecret: moiraweave-secrets
    existingSecretPasswordKey: REDIS_PASSWORD
  master:
    persistence:
      enabled: false
# ---------------------------------------------------------------------------
# PostgreSQL (Bitnami subchart) — required control-plane storage.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: moiraweave
    password: moiraweave-dev
    database: moiraweave
  primary:
    persistence:
      enabled: true
      size: 10Gi
# ---------------------------------------------------------------------------
# Qdrant (subchart)
# https://github.com/qdrant/qdrant-helm
# ---------------------------------------------------------------------------
qdrant:
  enabled: true
  replicaCount: 1
# ---------------------------------------------------------------------------
# Optional Ops dashboard UI
# ---------------------------------------------------------------------------
ui:
  enabled: false
  image:
    repository: ghcr.io/moiraweave-labs/moiraweave-ui
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: "" # leave empty to derive from fullname
# ---------------------------------------------------------------------------
# RBAC — Role + RoleBinding for the ServiceAccount.
# Grants minimal permissions: read ConfigMaps and Secrets within the namespace.
# ---------------------------------------------------------------------------
rbac:
  create: true
# ---------------------------------------------------------------------------
# NetworkPolicy — default-deny + explicit allow rules per component.
# Requires a CNI that enforces NetworkPolicy (e.g. Calico, Cilium, Weave).
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
# ---------------------------------------------------------------------------
# Shared PVC for model-weight caching when workload manifests request it.
# ---------------------------------------------------------------------------
modelsCache:
  size: 10Gi
  storageClass: "" # "" → cluster default StorageClass
# ---------------------------------------------------------------------------
# Generic AI workloads rendered from workload.yaml manifests.
# Prefer using `moira deploy k8s` to generate this block.
#
# Managed workloads are rendered as in-namespace Deployments and Services.
# Their Kubernetes Service name defaults to workload metadata.name so workers can
# resolve the same runtime URL used in local Compose: http://<workload>:<port>.
# External workloads are kept in the control plane only and must set
# spec.endpoint in their workload manifest.
# ---------------------------------------------------------------------------
workloads: {}
