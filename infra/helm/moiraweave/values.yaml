# ---------------------------------------------------------------------------
# MoiraWeave Helm chart — base values
# Override with values-dev.yaml or values-prod.yaml
# ---------------------------------------------------------------------------

nameOverride: ""
fullnameOverride: ""
# ---------------------------------------------------------------------------
# Image registry used by CI/CD (F3-3 pushes here)
# ---------------------------------------------------------------------------
imageRegistry: ghcr.io/moiraweave-labs
# ---------------------------------------------------------------------------
# api-gateway
# ---------------------------------------------------------------------------
apiGateway:
  image:
    repository: ghcr.io/moiraweave-labs/moiraweave-core/api-gateway
    tag: sha-c293d65
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Horizontal Pod Autoscaler (requires metrics-server; see hpa.yaml)
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # List (not map) to guarantee stable env-var order across renders → avoids
  # unnecessary pod restarts caused by non-deterministic Go map iteration.
  env:
    - name: JWT_ALGORITHM
      value: HS256
    - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
      value: "30"
    - name: RATE_LIMIT_DEFAULT
      value: 100/minute
    - name: RATE_LIMIT_AUTH
      value: 10/minute
    - name: QDRANT_COLLECTION
      value: transcriptions
    - name: EMBEDDING_MODEL
      value: BAAI/bge-small-en-v1.5
    - name: PIPELINES_DIR
      value: /workspace/pipelines
    - name: OTEL_ENABLED
      value: "false"
    - name: OTEL_OTLP_ENDPOINT
      value: http://jaeger-collector:4318
  # Reference to a pre-existing K8s Secret that contains JWT_SECRET_KEY.
  # Create it once with:
  #   kubectl create secret generic moiraweave-secrets \
  #     --from-literal=JWT_SECRET_KEY=<your-32-char-secret>
  existingSecret: moiraweave-secrets
  secretKey: JWT_SECRET_KEY
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  # PodDisruptionBudget: keep at least 1 pod available during voluntary disruptions.
  pdb:
    enabled: true
    minAvailable: 1
  # Ingress (requires ingress-nginx + cert-manager, F2-8)
  ingress:
    enabled: false
    host: moiraweave.local
    tls: false
    clusterIssuer: moiraweave-ca-issuer
    annotations: {}
# ---------------------------------------------------------------------------
# worker
# ---------------------------------------------------------------------------
worker:
  image:
    repository: ghcr.io/moiraweave-labs/moiraweave-core/worker
    tag: sha-c293d65
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: QDRANT_COLLECTION
      value: transcriptions
    - name: EMBEDDING_MODEL
      value: BAAI/bge-small-en-v1.5
    - name: LOG_LEVEL
      value: INFO
    - name: PIPELINES_DIR
      value: /workspace/pipelines
  # PodDisruptionBudget for worker.
  pdb:
    enabled: true
    minAvailable: 1
# ---------------------------------------------------------------------------
# Redis (Bitnami subchart)
# https://github.com/bitnami/charts/tree/main/bitnami/redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
# ---------------------------------------------------------------------------
# Qdrant (subchart)
# https://github.com/qdrant/qdrant-helm
# ---------------------------------------------------------------------------
qdrant:
  enabled: true
  replicaCount: 1
# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: "" # leave empty to derive from fullname
# ---------------------------------------------------------------------------
# vLLM inference server (F2-4)
# Disabled by default; enable via values-gpu.yaml overlay or set vllm.enabled=true
# ---------------------------------------------------------------------------
vllm:
  enabled: false
  image:
    repository: vllm/vllm-openai
    tag: "v0.6.6"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # Model to load at startup.  Set to a public HF model or a locally mounted path.
  model: "mistralai/Mistral-7B-Instruct-v0.3"
  # HuggingFace token for gated models — read from the same pre-existing Secret
  # used by api-gateway (kubectl create secret generic moiraweave-secrets ...).
  hfTokenSecret:
    name: moiraweave-secrets
    key: HF_TOKEN
  resources:
    requests:
      cpu: "2000m"
      memory: 8Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "4000m"
      memory: 16Gi
      nvidia.com/gpu: "1"
  # Place vLLM pods on GPU-capable nodes.
  # GPU Operator + NFD (F2-3) label nodes with nvidia.com/gpu.present=true.
  nodeSelector:
    nvidia.com/gpu.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  service:
    type: ClusterIP
    port: 8000
  env:
    - name: VLLM_WORKER_MULTIPROC_METHOD
      value: spawn
    - name: VLLM_TENSOR_PARALLEL_SIZE
      value: "1"
    - name: HF_HOME
      value: /data/huggingface
  # PVC to cache HuggingFace model weights — avoids re-download on pod restart.
  persistence:
    enabled: true
    size: 30Gi
    storageClass: "" # "" → cluster default StorageClass
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 120 # allow time for model loading
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 10
# ---------------------------------------------------------------------------
# Shared PVC for model-weight caching (used by steps with modelVolume set).
# ---------------------------------------------------------------------------
modelsCache:
  size: 10Gi
  storageClass: "" # "" → cluster default StorageClass
# ---------------------------------------------------------------------------
# MoiraWeave pipelines
#
# Intentionally empty by default to keep the platform generic and
# workspace-owned. Define pipelines/steps via user overlays.
#
# Example:
# pipelines:
#   my-pipeline:
#     enabled: true
#     env:
#       QDRANT_COLLECTION: "my-collection"
#     steps:
#       embed:
#         image: "ghcr.io/moiraweave-labs/moiraweave-steps/step-text-embed-fastembed:v1.0.0"
# ---------------------------------------------------------------------------
pipelines: {}
