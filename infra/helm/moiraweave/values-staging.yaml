# ---------------------------------------------------------------------------
# values-staging.yaml — staging overlay
#
# Usage:
#   helm upgrade --install moiraweave infra/helm/moiraweave \
#     -f infra/helm/moiraweave/values-staging.yaml \
#     --namespace moiraweave-staging --create-namespace
#
# Prerequisites:
#   kubectl create secret generic moiraweave-secrets \
#     --from-literal=JWT_SECRET_KEY=<32-char-secret> \
#     --from-literal=REDIS_PASSWORD=<password> \
#     --namespace moiraweave-staging
# ---------------------------------------------------------------------------

apiGateway:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
  hpa:
    enabled: false
  pdb:
    # replicaCount:1 + minAvailable:1 would block ALL voluntary disruptions.
    # Keep PDB disabled until staging runs ≥2 replicas.
    enabled: false
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

worker:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
  pdb:
    enabled: false
  livenessProbe:
    exec:
      command:
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1',9090),1); s.close()"
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1',9090),1); s.close()"
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

redis:
  auth:
    enabled: true
    existingSecret: moiraweave-secrets
    existingSecretPasswordKey: REDIS_PASSWORD
  master:
    persistence:
      enabled: true
      size: 4Gi

qdrant:
  replicaCount: 1
  persistence:
    enabled: true
    size: 10Gi

networkPolicy:
  enabled: true

rbac:
  create: true
