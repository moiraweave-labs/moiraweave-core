{{- if .Values.networkPolicy.enabled }}
# ---------------------------------------------------------------------------
# NetworkPolicy — defence-in-depth: deny all by default, then allow
# only the minimum required traffic between components.
#
# Requires a CNI that enforces NetworkPolicy (e.g. Calico, Cilium, Weave Net).
# ---------------------------------------------------------------------------

# 1. Default deny — drop all ingress/egress within the namespace unless
#    explicitly permitted by one of the policies below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "moiraweave.fullname" . }}-default-deny
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# 2. API Gateway — accepts inbound HTTP from ingress-nginx only.
#    Allows outbound to Redis, Postgres, Qdrant, workload health endpoints, and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "moiraweave.fullname" . }}-api-gateway
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "moiraweave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Postgres control-plane store
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Qdrant
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
      ports:
        - protocol: TCP
          port: 6333
    # Workload health probes and deployment checks
    - to:
        - podSelector:
            matchLabels:
              {{- include "moiraweave.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: workload
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# 3. Worker — accepts inbound metrics scraping from Prometheus only.
#    Allows outbound to Redis, Postgres, Qdrant, workload pods, and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "moiraweave.fullname" . }}-worker
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "moiraweave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus metrics scrape
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Postgres control-plane store
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Qdrant
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
      ports:
        - protocol: TCP
          port: 6333
    # Generic workload pods expose arbitrary declared ports.
    - to:
        - podSelector:
            matchLabels:
              {{- include "moiraweave.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: workload
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# 4. Workload pods — accept inbound from worker and api-gateway only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "moiraweave.fullname" . }}-workloads
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "moiraweave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: workload
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "moiraweave.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: worker
        - podSelector:
            matchLabels:
              {{- include "moiraweave.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api-gateway
{{- if .Values.ui.enabled }}
---
# 5. UI — accepts HTTP from ingress-nginx and proxies API requests.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "moiraweave.fullname" . }}-ui
  labels:
    {{- include "moiraweave.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "moiraweave.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "moiraweave.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api-gateway
      ports:
        - protocol: TCP
          port: 8000
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}
