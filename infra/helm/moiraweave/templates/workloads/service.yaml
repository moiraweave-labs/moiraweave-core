{{- range $name, $workload := .Values.workloads }}
{{- $deployment := default dict $workload.deployment }}
{{- $targets := default (list "local" "kubernetes") $deployment.targets }}
{{- if and ($workload.enabled) (ne (default "managed" $deployment.mode) "external") (has "kubernetes" $targets) ($workload.image) ($workload.ports) }}
{{- $ctx := dict "root" $ "name" $name "workload" $workload }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moiraweave.workload.serviceName" $ctx }}
  labels:
    {{- include "moiraweave.labels" $ | nindent 4 }}
    app.kubernetes.io/component: workload
    moiraweave.io/workload: {{ $name }}
spec:
  type: {{ default "ClusterIP" $workload.serviceType }}
  selector:
    {{- include "moiraweave.workload.selectorLabels" $ctx | nindent 4 }}
  ports:
    {{- range $port := $workload.ports }}
    - name: {{ default "http" $port.name }}
      port: {{ $port.port }}
      targetPort: {{ default $port.port $port.targetPort }}
      protocol: {{ default "TCP" $port.protocol }}
    {{- end }}
{{- end }}
{{- end }}
