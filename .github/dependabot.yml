version: 2
updates:
  - package-ecosystem: pip
    directory: /services/api-gateway
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    groups:
      minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /services/worker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    groups:
      minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    groups:
      actions:
        patterns: ["*"]
