# .github/workflows/ci.yml
#
# CI/CD pipeline for MoiraWeave MLOps.
#
# Jobs:
#   1. lint-test   — ruff + mypy + pytest (all branches & PRs)
#   2. build-push  — Docker buildx → GHCR (push to main only)
#   3. bump-tag    — yq bump image.tag in values.yaml → git commit (main only)
#
# Security model:
#   - GHCR push uses GITHUB_TOKEN (no long-lived secrets needed for same-repo packages).
#   - For external cloud providers (AWS/GCP/Azure), add
#       permissions: id-token: write
#     and swap to the provider's OIDC action (e.g. aws-actions/configure-aws-credentials@v4).

name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main

# Prevent redundant concurrent runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions (principle of least privilege).
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/moiraweave-labs/moiraweave-core
  PYTHON_VERSION: "3.13"

# ---------------------------------------------------------------------------
# Job 1 — lint + typecheck + test
# ---------------------------------------------------------------------------
jobs:
  lint-test:
    name: Lint, typecheck & test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install all dependencies (workspace root)
        run: uv sync --frozen --all-packages

      - name: Pre-commit Ruff lint
        shell: bash
        run: |
          uv run pre-commit run ruff --files \
            $(find services/api-gateway services/worker -name "*.py" -type f)

      - name: Pre-commit Ruff format
        shell: bash
        run: |
          uv run pre-commit run ruff-format --files \
            $(find services/api-gateway services/worker -name "*.py" -type f)

      - name: Ruff lint
        run: uv run ruff check services/api-gateway services/worker

      - name: Ruff format check
        run: uv run ruff format --check services/api-gateway services/worker

      - name: Mypy typecheck
        shell: bash
        run: |
          SHARED_PATH="${GITHUB_WORKSPACE}/services/shared"
          MYPYPATH="$SHARED_PATH" uv run --directory services/api-gateway mypy app/
          MYPYPATH="$SHARED_PATH" uv run --directory services/worker     mypy app/

      - name: Pytest
        run: uv run pytest

      - name: Helm lint — moiraweave chart
        run: |
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint infra/helm/moiraweave

      - name: YAML lint — infra/k8s
        run: uv run yamllint -d relaxed infra/k8s/

  # ---------------------------------------------------------------------------
  # Job 2 — Build Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & push Docker images
    needs: lint-test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Only build+push on pushes to main or release branches (not PRs).
    if: github.event_name == 'push'
    permissions:
      packages: write            # GHCR push
      contents: read
      security-events: write     # Trivy SARIF upload to Code Scanning
      # Uncomment for cloud OIDC (AWS/GCP/Azure):
      # id-token: write
    strategy:
      matrix:
        service:
          - api-gateway
          - worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically available; no extra secrets needed.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # no-cache + pull ensure the OS upgrade layer is never served from
          # the GHA cache, so Trivy always sees patched base packages.
          no-cache: true
          pull: true
          platforms: linux/amd64

      - name: Trivy — enforce policy (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy — generate SARIF for Code Scanning
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Job 3 — Bump image tag in Helm values and commit
  # ---------------------------------------------------------------------------
  bump-tag:
    name: Bump Helm image tag
    needs: build-push
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Only bump on main branch pushes.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write   # git push to develop
    steps:
      # HELM_BUMP_TOKEN is a Fine-Grained PAT (contents: write) owned by a repo
      # admin, which lets the bot push directly to protected main.
      # Fallback to GITHUB_TOKEN keeps the job non-fatal if the secret is absent
      # (e.g. forks), but the push to main will fail in that case.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HELM_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve release tag or fallback
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump api-gateway image tag
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: yq -i '.apiGateway.image.tag = "${{ steps.release.outputs.tag }}"' infra/helm/moiraweave/values.yaml

      - name: Bump worker image tag
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: yq -i '.worker.image.tag = "${{ steps.release.outputs.tag }}"' infra/helm/moiraweave/values.yaml

      - name: Commit & push to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/moiraweave/values.yaml
          # Exit cleanly if nothing changed (idempotent).
          git diff --cached --quiet && exit 0
          git commit --no-verify \
            -m "chore(helm): bump image tags to ${{ steps.release.outputs.tag }} [skip ci]"
          git push origin main
