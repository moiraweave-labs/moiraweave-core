# MoiraWeave MLOps — local development stack
#
# Profiles
#   (none)           core services: api-gateway, worker, postgres, redis, qdrant, jaeger
#   --profile ui     + Ops dashboard
#   --profile mlops  + MLflow tracking server
#
# Quick start:
#   cp .env.example .env        # fill in JWT_SECRET_KEY
#   docker compose up -d        # core only
#   docker compose --profile ui up -d
#   docker compose --profile mlops up -d   # core + mlops
#
# Override any port in .env, e.g. REDIS_PORT=6380

services:
  # ── api-gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      # Secrets — set JWT_SECRET_KEY in your .env (never commit it)
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      RATE_LIMIT_DEFAULT: "100/minute"
      RATE_LIMIT_AUTH: "10/minute"
      # OpenTelemetry — points to the jaeger service defined below
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "api-gateway"
      OTEL_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SAMPLE_RATE: "1.0"
      # Redis (queues and short-lived coordination)
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_DSN: "postgresql://${POSTGRES_USER:-moiraweave}:${POSTGRES_PASSWORD:-moiraweave-dev}@postgres:5432/${POSTGRES_DB:-moiraweave}"
      WORKLOADS_DIR: "/workspace/workloads"
      ARTIFACTS_DIR: "/workspace/artifacts"
      # Qdrant (vector store)
      QDRANT_URL: "http://qdrant:6333"
      EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
      FASTEMBED_CACHE_PATH: "/app/.models"
    volumes:
      - fastembed_models:/app/.models
      - ./workloads:/workspace/workloads:ro
      - ./artifacts:/workspace/artifacts
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── Worker ─────────────────────────────────────────────────────────────────
  # Async Redis Streams consumer — processes workload runs
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_DSN: "postgresql://${POSTGRES_USER:-moiraweave}:${POSTGRES_PASSWORD:-moiraweave-dev}@postgres:5432/${POSTGRES_DB:-moiraweave}"
      LOG_LEVEL: "INFO"
      WORKLOADS_DIR: "/workspace/workloads"
      ARTIFACTS_DIR: "/workspace/artifacts"
    volumes:
      - ./workloads:/workspace/workloads:ro
      - ./artifacts:/workspace/artifacts
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  # Rate-limit storage + async run queue (Redis Streams)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  # Vector DB for RAG workloads
  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"    # REST
      - "${QDRANT_GRPC_PORT:-6334}:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── Jaeger (all-in-one) ─────────────────────────────────────────────────────
  # OTel trace collector + UI — http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"    # Jaeger UI
      - "4317:4317"                          # OTLP/gRPC
      - "4318:4318"                          # OTLP/HTTP (← api-gateway target)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-moiraweave}"
      POSTGRES_USER: "${POSTGRES_USER:-moiraweave}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-moiraweave-dev}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moiraweave} -d ${POSTGRES_DB:-moiraweave}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── Ops dashboard (ui profile) ───────────────────────────────────────────────
  ui:
    build:
      context: ../moiraweave-ui
    profiles: [ui]
    ports:
      - "${MOIRAWEAVE_UI_PORT:-3000}:80"
    environment:
      VITE_API_BASE_URL: "http://localhost:${API_GATEWAY_PORT:-8000}"
      API_PROXY_PASS: "http://api-gateway:8000"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - moiraweave-net

  # ── MLflow tracking server (mlops profile) ──────────────────────────────────
  # UI: http://localhost:5001
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    profiles: [mlops]
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-moiraweave}:${POSTGRES_PASSWORD:-moiraweave-dev}@postgres:5432/${POSTGRES_DB:-moiraweave}
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moiraweave-net

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  moiraweave-net:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  qdrant_data:
  fastembed_models:
  postgres_data:
  mlflow_artifacts:
