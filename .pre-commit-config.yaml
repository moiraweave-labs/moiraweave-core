# run `make pre-commit-install` once after cloning
# run `pre-commit autoupdate` to update hook revisions

repos:
  # ---------------------------------------------------------------------------
  # Ruff — linter (with auto-fix) + formatter
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy — static type checker
  # ---------------------------------------------------------------------------
  # Uses the project's own uv environment — no additional_dependencies needed.
  # Run per-service to avoid duplicate 'app' module name conflict in mypy.
  - repo: local
    hooks:
      - id: mypy-api-gateway
        name: mypy (api-gateway)
        entry: bash -c "cd services/api-gateway && uv run --frozen mypy app/"
        language: system
        pass_filenames: false
        types: [python]
      - id: mypy-worker
        name: mypy (worker)
        entry: bash -c "cd services/worker && uv run --frozen mypy app/"
        language: system
        pass_filenames: false
        types: [python]

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow custom YAML tags (Helm, k8s)
        exclude: ^infra/helm/.*/templates/  # Helm templates use Go syntax, not valid YAML
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
